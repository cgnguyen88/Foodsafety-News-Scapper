<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glaido AI News Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=5">
</head>
<body>

    <!-- Hero Section -->
    <section class="hero-section" id="hero">
        <div class="hero-bg">
            <div class="hero-overlay"></div>
        </div>

        <div class="hero-content">

            <!-- Avatar stack -->
            <div class="hero-avatars">
                <div class="avatar-stack">
                    <div class="avatar" style="z-index:5"><img src="https://res.cloudinary.com/doonkheo8/image/upload/v1770279333/a1.jpg" alt=""></div>
                    <div class="avatar" style="z-index:4"><img src="https://res.cloudinary.com/doonkheo8/image/upload/v1770279333/a2.jpg" alt=""></div>
                    <div class="avatar" style="z-index:3"><img src="https://res.cloudinary.com/doonkheo8/image/upload/v1770279333/a3.jpg" alt=""></div>
                    <div class="avatar" style="z-index:2"><img src="https://res.cloudinary.com/doonkheo8/image/upload/v1770279333/a4.jpg" alt=""></div>
                    <div class="avatar" style="z-index:1"><img src="https://res.cloudinary.com/doonkheo8/image/upload/v1770279333/a5.jpg" alt=""></div>
                </div>
            </div>

            <!-- Bottom: headline + description -->
            <div class="hero-bottom">
                <div class="hero-left">
                    <h1 class="hero-title">AI news that <span class="hero-accent">matters</span>,<br><span class="hero-accent">every</span> morning</h1>
                    <a href="#news" class="hero-cta">
                        Read More
                        <span class="hero-cta-icon">→</span>
                    </a>
                </div>
                <div class="hero-right">
                    <p class="hero-description">Fresh AI breakthroughs, community discussions, and industry updates — curated daily from The AI Rundown, Reddit, and beyond.</p>
                </div>
            </div>

        </div>
    </section>

    <div id="news"></div>
    <header class="dashboard-header">
        <div class="header-content">
            <img src="assets/glaido-main-white.svg" alt="Glaido Logo" class="logo">
            <h1>AI News Dashboard</h1>
            <p class="last-updated">Last updated: <span id="timestamp">Loading...</span></p>
            <button id="refresh-btn" class="refresh-btn" aria-label="Refresh articles" title="Refresh articles">
                <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
                Refresh
            </button>
        </div>
    </header>

    <main class="container">
        <nav class="filters" role="navigation" aria-label="Filter articles">
            <button class="filter-btn active" data-source="all" aria-current="true">
                <span class="filter-icon">🌐</span> All
            </button>
            <button class="filter-btn" data-source="ai_rundown">
                <span class="filter-icon">📰</span> AI Rundown
            </button>
            <button class="filter-btn" data-source="reddit">
                <span class="filter-icon">💬</span> Reddit
            </button>
            <button class="filter-btn" data-source="saved">
                <span class="filter-icon">⭐</span> Saved
            </button>
        </nav>

        <div id="loading" class="loading-state">
            <div class="skeleton-grid">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </div>

        <div id="empty-state" class="empty-state" style="display: none;">
            <p>No articles found. Check back later!</p>
        </div>

        <div id="articles-grid" class="articles-grid"></div>
    </main>

    <script src="app.js?v=5"></script>
</body>
</html>
